version: 2

project_name: notion-cli

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/JeremieAlcaraz/notion-cli/cmd.Version={{.Version}}
    binary: notion

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: JeremieAlcaraz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/JeremieAlcaraz/notion-cli"
    description: "Notion CLI for humans and AI agents — optimized token consumption."
    license: "MIT"
    dependencies:
      - name: gum
        type: optional
    install: |
      bin.install "notion"
    post_install: |
      ohai "Install the AI agent skill:"
      ohai "  notion skill install"
